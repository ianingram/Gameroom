<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical 3D Chess & Checkers</title>
    <style>
        /* Remove margins and make the canvas fill the window */
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        
        /* Simple UI overlay for the top left corner */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: sans-serif;
            pointer-events: none; /* Lets clicks pass through to the 3D scene */
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>Historical Chess</h2>
        <p id="status">White to move</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="logic.js"></script>
    <script type="module" src="render.js"></script>

</body>
</html>
